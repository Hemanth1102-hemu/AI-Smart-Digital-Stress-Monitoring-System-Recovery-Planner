{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Digital Stress Monitoring System{% endblock %}</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="theme-color" content="#0d0f17">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StressMonitor">
    <link rel="manifest" href="{% static 'core/manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'core/images/icon-192.png' %}">
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'core/css/index.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Background Animation Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <!-- Main Content Container -->
    <main class="app-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Custom JS Scripts -->
    <script src="{% static 'core/js/main.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
