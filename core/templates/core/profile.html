{% extends 'core/base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'core/css/dashboard.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <!-- Navbar could go here if needed -->
    <header class="app-header">
        <h2 class="logo-text">System<span class="highlight">Setup</span></h2>
    </header>

    <div class="profile-container">
        <div class="glass-card profile-card">
            <div class="profile-layout">
                <!-- Left: Form -->
                <div class="profile-form-section">
                    <h1 class="page-title">Profile Setup</h1>
                    <p class="tagline">Lets customize your experience.</p>

                    <form action="{% url 'dashboard' %}" class="profile-form">
                        <div class="input-group">
                            <label class="input-label">Nickname</label>
                            <input type="text" class="input-field" placeholder="How should we call you?" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label class="input-label">Weight (kg)</label>
                                <input type="number" class="input-field" placeholder="e.g. 70" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Height (cm)</label>
                                <input type="number" class="input-field" placeholder="e.g. 175" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Date of Birth</label>
                            <input type="date" class="input-field" required>
                        </div>
                        <div class="input-group">
                            <label class="input-label">Any underlying illness/therapies?</label>
                            <input type="text" class="input-field" placeholder="Optional">
                        </div>

                        <div class="form-actions" style="margin-top: 30px;">
                            <button type="submit" class="btn-primary">Confirm Details</button>
                        </div>
                    </form>
                </div>

                <!-- Right: Avatar -->
                <div class="profile-avatar-section">
                    <div class="avatar-wrapper">
                        <!-- Pure CSS human stick figure / abstract avatar representation -->
                        <div class="abstract-avatar">
                            <div class="head"></div>
                            <div class="body-torso"></div>
                            <div class="arms"></div>
                        </div>
                    </div>
                    <p class="avatar-label">Your Avatar</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
