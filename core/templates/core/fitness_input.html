{% extends 'core/base.html' %}
{% load static %}

{% block extra_head %}
<!-- Reusing dashboard layout styles and adding custom fitness specific styles -->
<link rel="stylesheet" href="{% static 'core/css/dashboard.css' %}">
<link rel="stylesheet" href="{% static 'core/css/fitness.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <header class="app-header">
        <h2 class="logo-text">System<span class="highlight">Setup</span></h2>
        <div class="step-indicator">Step 1 of 4</div>
    </header>

    <div class="profile-container">
        <div class="glass-card profile-card">
            <div class="profile-layout">
                <!-- Left: Form -->
                <div class="profile-form-section">
                    <h1 class="page-title">Fitness Profile</h1>
                    <p class="tagline">Lets capture your baseline metrics.</p>

                    <form action="{% url 'fitness_input' %}" method="post" class="profile-form">
                        {% csrf_token %}
                        <div class="input-row">
                            <div class="input-group">
                                <label class="input-label">Weight (kg)</label>
                                <input type="number" name="weight" class="input-field" placeholder="e.g. 70" value="{{ weight }}" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Height (cm)</label>
                                <input type="number" name="height" class="input-field" placeholder="e.g. 175" value="{{ height }}" required>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label class="input-label">Avg Sleep (hrs)</label>
                                <input type="number" name="avg_sleep" step="0.5" class="input-field" placeholder="e.g. 7" value="{{ avg_sleep }}" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Avg Screen (hrs)</label>
                                <input type="number" name="avg_screen" step="0.5" class="input-field" placeholder="e.g. 5" value="{{ avg_screen }}" required>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label class="input-label">Age</label>
                                <input type="number" name="age" class="input-field" placeholder="e.g. 25" value="{{ age }}" required>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Activity Level</label>
                                <select name="activity" class="input-field" required>
                                    <option value="" disabled {% if not activity %}selected{% endif %}>Select level</option>
                                    <option value="sedentary" {% if activity == 'sedentary' %}selected{% endif %}>Sedentary (Little to no exercise)</option>
                                    <option value="light" {% if activity == 'light' %}selected{% endif %}>Light (Exercise 1-3 days/wk)</option>
                                    <option value="moderate" {% if activity == 'moderate' %}selected{% endif %}>Moderate (Exercise 3-5 days/wk)</option>
                                    <option value="active" {% if activity == 'active' %}selected{% endif %}>Active (Exercise 6-7 days/wk)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions" style="margin-top: 30px;">
                            <button type="submit" class="btn-primary">Next: Stress Metrics &rarr;</button>
                        </div>
                    </form>
                </div>

                <!-- Right: 3D Rotating Avatar -->
                <div class="profile-avatar-section">
                    <div class="scene">
                        <div class="human-figure">
                            <div class="body-part head-3d"></div>
                            <div class="body-part torso-3d"></div>
                            <div class="body-part arm-left-3d"></div>
                            <div class="body-part arm-right-3d"></div>
                            <div class="body-part leg-left-3d"></div>
                            <div class="body-part leg-right-3d"></div>
                        </div>
                    </div>
                    <p class="avatar-label mt-4">Analyzing Biometrics</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
